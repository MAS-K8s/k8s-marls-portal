<div class="bg-surface-0 border border-black/10 dark:border-white/20 dark:bg-surface-950 w-full flex flex-col md:flex-row" >

</div>



<div class="bg-surface-0 border border-black/10 dark:border-white/20 dark:bg-surface-950 w-full flex flex-col md:flex-row" >
  <!-- Sidebar for medium screens and up -->
  <div class="hidden md:block h-screen sticky top-0 bg-surface-0 dark:bg-surface-950" style="width: 250px;">
    <app-sidebar 
    *ngIf="appConfigService.sideBarVisibility$ | async"
      @sidebarSlide
    ></app-sidebar>
  </div>
  
  <!-- Mobile sidebar -->
  <div class="md:hidden">
    <app-sidebar 
      *ngIf="appConfigService.sideBarVisibility$ | async" 
      @sidebarSlide 
      class="fixed z-50 top-0 left-0 h-screen transform transition-transform
            bg-surface-0 dark:bg-surface-950"
      [class.translate-x-0]="appConfigService.sideBarVisibility$ | async"
      [class.-translate-x-full]="!(appConfigService.sideBarVisibility$ | async)"
    ></app-sidebar>
  </div>
  
  <!-- Main content area -->
  <div class="flex-1 flex flex-col min-w-0 overflow-auto">
    <div class="flex justify-between items-center pt-3 md:pt-0 shrink-0 p-2 md:p-6 mt-3 md:mt-5">
      <p-button
        class="md:hidden mr-5"
        severity="secondary"
        (click)="LayoutClick($event,true)"
        icon="pi pi-align-justify">
      </p-button>
      
      <!-- Branch Info Section -->
      
      <!-- Controls Section -->
      <div class="flex items-center flex-shrink-0 ml-2">
        <p-button 
          *ngIf="showSelectBranch"
          icon="pi pi-sitemap" 
          styleClass="mr-2" 
          (click)="navigatetoselectbranch()"
          pTooltip="Change Branch"
          tooltipPosition="bottom">
        </p-button>
        
        <p-button (click)="visible = true" icon="pi pi-palette"></p-button>
      </div>
    </div>
  
    <p-toast></p-toast>
    
    <div class="flex-1 p-2 md:p-6 overflow-auto">
      <router-outlet></router-outlet>
    </div>

    <p-drawer
      header="Theme Configurator"
      [(visible)]="visible"
      styleClass="!w-full md:!w-80 lg:!w-[30rem] rounded-l-2xl"
      position="right"
    >
      <app-configurator></app-configurator>
    </p-drawer>
  </div>
</div>
