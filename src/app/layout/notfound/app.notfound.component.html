<div class="flex flex-col justify-center items-center text-gray-900 bg-surface-0 border border-black/10 dark:border-color/20 dark:bg-surface-950 w-full h-screen rounded-3xl overflow-hidden relative">
    <div class="exception-panel bg-primary text-color shadow-2xl rounded-2xl p-12 text-center max-w-md w-full transform transition-all">
        <h1 class="text-8xl font-extrabold text-color mb-4 drop-shadow-lg">404</h1>
        <h3 class="text-3xl uppercase tracking-widest text-color/90 mb-6">not found</h3>
        <p class="text-color/80 mb-8 text-lg">The page that you are looking for does not exist.</p>
        <button 
            type="button" 
            pButton 
            label="Return to Home" 
            [routerLink]="['/']"
            class="bg-color text-primary hover:bg-color/90 font-bold py-3 px-6 rounded-full transition-all duration-300 shadow-md hover:shadow-lg transform transition-al hover:scale-105"
        ></button>
    </div>
    <div class="exception-footer mt-10 flex flex-col items-center" [routerLink]="['/']">
        <img [src]="getLogoSrc()" class="exception-logo max-h-20 mb-4 opacity-70 transition-opacity hover:opacity-100"/>
        <div class="layout-footer">
            <div class="footer-logo-container">
                <span class="app-name text-gray-400 font-semibold text-lg opacity-70 hover:opacity-100">Mezota</span>
            </div>
        </div>
    </div>
</div>
