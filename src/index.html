<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mpos</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;200;300;400;500;600;700;800;900&family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
  <style>
    /* Basic CSS for the loading animation */
    #loading-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f5f5f5;
      color: #333;
      font-family: 'Open Sans', sans-serif;
      font-size: 20px;
      flex-direction: column;
    }

    .logo {
      width: 100px;
      height: 100px;
      animation: subtleScale 2s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes subtleScale {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1);
      }
    }
    #loading-screen div {
      font-size: 24px;
    }
  </style>
</head>
<body>
  <app-root>
    <div id="loading-screen">
      <img class="logo" src="#" alt="Loading Logo">
    </div>
  </app-root>
</body>
</html>
