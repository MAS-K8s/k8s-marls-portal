<div class="bg-surface-0 dark:bg-surface-900 rounded-xl shadow-md p-6 mb-6">
  <h3 class="text-xl font-medium mb-4 text-color">{{ title }}</h3>

  <div
    class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4"
    *ngIf="
      reportType === 'sales-summary' ||
      reportType === 'top-selling' ||
      reportType === 'lowest-selling'
    "
  >
    <div>
      <label class="block text-sm font-medium mb-1 text-color"
        >From Date:</label
      >
      <p-calendar
      [(ngModel)]="fromDate"
      [showIcon]="true"
      dateFormat="yy-mm-dd"
      styleClass="w-full"
      [appendTo]="'body'"
      appendTo="body"
      [showOnFocus]="false"
      [showButtonBar]="true"
      [readonlyInput]="true"
    ></p-calendar>
    
    </div>

    <div>
      <label class="block text-sm font-medium mb-1 text-color">To Date:</label>
      <p-calendar
      [(ngModel)]="toDate"
      [showIcon]="true"
      dateFormat="yy-mm-dd"
      styleClass="w-full"
      [appendTo]="'body'"
      appendTo="body"
      [showOnFocus]="false"
      [showButtonBar]="true"
    ></p-calendar>
    </div>
  </div>

  <div
    class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4"
    *ngIf="reportType === 'daily-sales' || reportType === 'stock-report'"
  >
    <div>
      <label class="block text-sm font-medium mb-1 text-color">Date:</label>
      <p-calendar
      [(ngModel)]="singleDate"
      [showIcon]="true"
      dateFormat="yy-mm-dd"
      styleClass="w-full"
      [baseZIndex]="1000"
      [appendTo]="'body'"
      [showOnFocus]="false"
      [showButtonBar]="true"
    ></p-calendar>
    </div>
  </div>

  <div class="flex flex-wrap gap-2">
    <button
      pButton
      type="button"
      label="Generate Report"
      icon="pi pi-sync"
      (click)="generateReport()"
      [loading]="isLoading"
    ></button>

    <button
      pButton
      type="button"
      label="Print"
      icon="pi pi-print"
      (click)="printReport()"
      [disabled]="!report"
      class="p-button-secondary"
    ></button>

    <button
      pButton
      type="button"
      label="Export to PDF"
      icon="pi pi-file-pdf"
      (click)="exportToPDF()"
      [disabled]="!report"
      class="p-button-secondary"
    ></button>
  </div>

  <div *ngIf="errorMessage" class="mt-4 p-4 bg-red-100 text-red-700 rounded-lg">
    {{ errorMessage }}
  </div>
</div>

<div class="bg-surface-0 dark:bg-surface-900 rounded-xl shadow-md p-6">
  <div *ngIf="isLoading" class="flex flex-col items-center justify-center h-64">
    <p-progressSpinner
      [style]="{ width: '50px', height: '50px' }"
      styleClass="mb-2"
    ></p-progressSpinner>
    <span class="text-color">Generating report...</span>
  </div>

  <div
    *ngIf="!isLoading && !report"
    class="flex flex-col items-center justify-center h-64 text-color-secondary"
  >
    <i class="pi pi-file-o text-6xl mb-4"></i>
    <p>Select a date range and click "Generate Report" to view the report.</p>
  </div>

  <div *ngIf="report" style="width: 100%; height: 600px">
    <iframe
      #reportFrame
      id="reportFrame"
      style="width: 100%; height: 100%; border: none"
    ></iframe>
  </div>
</div>
