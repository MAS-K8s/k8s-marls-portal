<p-toast />
<p-confirmdialog #cd>
  <ng-template
    #headless
    let-message
    let-onAccept="onAccept"
    let-onReject="onReject"
  >
    <div
      class="flex flex-col items-center p-8 bg-surface-0 dark:bg-surface-900 rounded"
    >
      <span class="font-bold text-2xl block mb-2 mt-6">{{
        message.header
      }}</span>
      <p class="mb-0">{{ message.message }}</p>
      <div class="flex items-center gap-2 mt-6">
        <p-button
          label="Cancel"
          [outlined]="true"
          (onClick)="onReject()"
          styleClass="w-32"
        ></p-button>
        <p-button
          label="Delete"
          (onClick)="onAccept()"
          styleClass="w-32"
          severity="danger"
        ></p-button>
      </div>
    </div>
  </ng-template>
</p-confirmdialog>
<div class="container mx-auto px-4">
  <!-- Header Section -->
  <div
    class="flex flex-col xl:flex-row items-center xl:items-start gap-2 justify-between"
  >
    <div>
      <div class="text-2xl leading-8 text-color font-medium">Reports</div>
    </div>
  </div>

  <!-- Reports Grid Layout -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
    <!-- Sales Summary Report -->
    <div class="bg-surface-0 dark:bg-surface-900 rounded-xl shadow-md p-6">
      <h3 class="text-xl font-medium mb-4 text-color flex items-center gap-2">
        <i class="pi pi-chart-bar text-blue-500" style="font-size: 1.25rem"></i>
        <span>Sales Summary Report</span>
      </h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1 text-color"
            >From Date:</label
          >
          <p-calendar
            class="w-full"
            [(ngModel)]="salesSummaryDates.fromDate"
            [showIcon]="true"
          ></p-calendar>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1 text-color"
            >To Date:</label
          >
          <p-calendar
            class="w-full"
            [(ngModel)]="salesSummaryDates.toDate"
            [showIcon]="true"
          ></p-calendar>
        </div>
      </div>
      <div class="mt-6 flex">
        <p-button
          label="Download PDF"
          icon="pi pi-file-pdf"
          class="mr-2"
          (click)="showSalesSummaryDialog()"
          [loading]="isLoading"
        ></p-button>
        <p-button
          label="Download Excel"
          icon="pi pi-file-excel"
          (click)="downloadReport('sales-summary', 'excel')"
          [disabled]="true"
        ></p-button>
      </div>
    </div>

    <!-- Daily Sales Summary Report -->
    <div class="bg-surface-0 dark:bg-surface-900 rounded-xl shadow-md p-6">
      <h3 class="text-xl font-medium mb-4 text-color flex items-center gap-2">
        <i
          class="pi pi-chart-line text-green-500"
          style="font-size: 1.25rem"
        ></i>
        <span>Daily Sales Summary</span>
      </h3>
      <div>
        <label class="block text-sm font-medium mb-1 text-color">Date:</label>
        <p-calendar
          class="w-full"
          [(ngModel)]="dailySalesSummaryDate"
          [showIcon]="true"
        ></p-calendar>
      </div>
      <div class="mt-6 flex">
        <p-button
          label="Download PDF"
          icon="pi pi-file-pdf"
          class="mr-2"
          (click)="showDailySalesSummaryDialog()"
          [loading]="isLoading"
        ></p-button>
        <p-button
          label="Download Excel"
          icon="pi pi-file-excel"
          (click)="downloadReport('daily-sales-summary', 'excel')"
          [disabled]="true"
        ></p-button>
      </div>
    </div>

    <!-- Top Selling Products Report -->
    <div class="bg-surface-0 dark:bg-surface-900 rounded-xl shadow-md p-6">
      <h3 class="text-xl font-medium mb-4 text-color flex items-center gap-2">
        <i
          class="pi pi-star-fill text-yellow-500"
          style="font-size: 1.25rem"
        ></i>
        <span>Top Selling Products</span>
      </h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1 text-color"

          >
          <p-calendar

          ></p-calendar>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1 text-color"

        </div>
      </div>
      <div class="mt-6 flex">

        <p-button

          icon="pi pi-file-excel"
          (click)="downloadReport('top-selling', 'excel')"
          [disabled]="true"
        ></p-button>
      </div>
    </div>

    <!-- Lowest Selling Products Report -->
    <div class="bg-surface-0 dark:bg-surface-900 rounded-xl shadow-md p-6">
      <h3 class="text-xl font-medium mb-4 text-color flex items-center gap-2">
        <i
          class="pi pi-arrow-circle-down text-red-500"
          style="font-size: 1.25rem"
        ></i>
        <span>Lowest Selling Products</span>
      </h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1 text-color"

          >
          <p-calendar

        </div>
        <div>
          <label class="block text-sm font-medium mb-1 text-color"

        </div>
      </div>
      <div class="mt-6 flex">

          class="mr-2"

          [loading]="isLoading"
        ></p-button>
        <p-button
          label="Download Excel"
          icon="pi pi-file-excel"
          (click)="downloadReport('lowest-selling', 'excel')"
          [disabled]="true"
        ></p-button>
      </div>
    </div>

    <!-- Stock Report -->
    <div class="bg-surface-0 dark:bg-surface-900 rounded-xl shadow-md p-6">
      <h3 class="text-xl font-medium mb-4 text-color flex items-center gap-2">
        <i
          class="pi pi-warehouse text-indigo-500"
          style="font-size: 1.25rem"
        ></i>
        <span>Stock Report</span>
      </h3>
      <div>
        <label class="block text-sm font-medium mb-1 text-color">Date:</label>
        <p-calendar
          class="w-full"
          [(ngModel)]="stockReportDate"
          [showIcon]="true"

        <p-button

          (click)="downloadReport('stock-report', 'excel')"
          [disabled]="true"
        ></p-button>
      </div>
    </div>
  </div>
</div>
