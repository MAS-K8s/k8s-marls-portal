<form
  [formGroup]="reportForm"
  class="card grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4"
>
  <div>
    <p-floatlabel class="w-full mt-3">
      <input
        pInputText
        id="Title"
        formControlName="Title"
        autocomplete="off"
        class="w-full"
      />
      <label for="Title">Title</label>
    </p-floatlabel>
  </div>

  <div>
    <p-floatlabel class="w-full mt-3">
      <input
        pInputText
        id="Description"
        formControlName="Description"
        autocomplete="off"
        class="w-full"
      />
      <label for="Description">Description</label>
    </p-floatlabel>
  </div>

  <div>
    <p-floatlabel class="w-full mt-3">
      <input
        pInputText
        id="Author"
        formControlName="Author"
        autocomplete="off"
        class="w-full"
      />
      <label for="Author">Author</label>
    </p-floatlabel>
  </div>
</form>

<!-- Save and Close Buttons -->
<div class="flex justify-evenly sm:justify-end sm:gap-4 mt-10">
  <div>
    <p-button
      label="Close"
      icon="pi pi-times"
      outlined="true"
      class="w-full sm:w-auto"
      (click)="CloseInstances($event)"
    ></p-button>
  </div>
  <div>
    <p-button
      label="Save"
      icon="pi pi-save"
      [loading]="isLoading"
      class="w-full sm:w-auto"
      (click)="save()"
    ></p-button>
  </div>
</div>
