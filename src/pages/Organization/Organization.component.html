<p-toast></p-toast>
<p-confirmdialog #cd></p-confirmdialog>

<div class="text-2xl leading-8 text-color font-medium">Settings</div>

<div class="bg-surface-0 dark:bg-surface-900 rounded-xl shadow-md p-6">

  <!-- Header Section -->
  <div class="flex flex-col xl:flex-row items-center xl:items-start gap-2 justify-between mb-6">
    <div class="flex gap-2">
      <ng-container *ngIf="activeTabIndex === 0">

        <p-button
          *ngIf="isEditing"
          label="Cancel"
          (onClick)="onCancel()"
          [outlined]="true"
          severity="secondary"
        ></p-button>

        <p-button
          *ngIf="isEditing"
          label="Save"
          (onClick)="onSave()"
          severity="primary"
        ></p-button>
      </ng-container>
    </div>
  </div>

  <!-- Tabs WITHOUT Company Tab -->
  <p-tabView [(activeIndex)]="activeTabIndex">

    <!-- Users Tab -->
    <p-tabPanel header="Users">
      <app-User *ngIf="activeTabIndex === 0"></app-User>
    </p-tabPanel>

    <!-- Roles Tab -->
    <p-tabPanel header="Roles">
      <app-Role *ngIf="activeTabIndex === 1"></app-Role>
    </p-tabPanel>

  </p-tabView>
</div>
